services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
    networks:
      - laravel
      - database_db_network
    environment:
      - DB_HOST=central_mysql
      - DB_PORT=3306
      - DB_DATABASE=inventory_laravel
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - REDIS_HOST=central_redis
      - REDIS_PORT=6379

  nginx:
    image: nginx:alpine
    container_name: laravel-nginx
    ports:
      - "8005:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel

networks:
  laravel:
    driver: bridge
  database_db_network:
    external: true
