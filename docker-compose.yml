services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./php-upload.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    networks:
      - laravel
      - database_db_network
    environment:
      - DB_HOST=central_mysql
      - DB_PORT=3306
      - DB_DATABASE=inventory_laravel
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - REDIS_HOST=central_redis
      - REDIS_PORT=6379
    restart: unless-stopped

  reverb:
    image: inventory-laravel-app
    container_name: laravel-reverb
    working_dir: /var/www
    command: >
      sh -lc "
      php -m | grep -q '^pcntl$' || docker-php-ext-install pcntl >/tmp/reverb-pcntl.log 2>&1;
      php artisan reverb:start --host=0.0.0.0 --port=8080
      "
    volumes:
      - ./:/var/www
      - ./php-upload.ini:/usr/local/etc/php/conf.d/uploads.ini:ro
    ports:
      - "8088:8080"
    networks:
      - laravel
      - database_db_network
    environment:
      - DB_HOST=central_mysql
      - DB_PORT=3306
      - DB_DATABASE=inventory_laravel
      - DB_USERNAME=admin
      - DB_PASSWORD=admin123
      - REDIS_HOST=central_redis
      - REDIS_PORT=6379
    depends_on:
      - app
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: laravel-nginx
    ports:
      - "8005:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app
    networks:
      - laravel
    restart: unless-stopped

networks:
  laravel:
    driver: bridge
  database_db_network:
    external: true
